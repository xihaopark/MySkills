site_name: MySkills 知识库
site_description: 面向中文读者的个人知识库，整理可复用的 agent system 设计、工作流技能和协作模式。
site_url: https://xihaopark.github.io/MySkills/
repo_url: https://github.com/xihaopark/MySkills
repo_name: xihaopark/MySkills
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  font:
    text: Noto Sans SC
    code: IBM Plex Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

extra_css:
  - assets/stylesheets/extra.css

nav:
  - 首页: index.md
  - Agent Loop 系统:
      - 总览: agent-loop-systems/index.md
      - 外部资料索引（Source Index）: agent-loop-systems/Agent-Loop-Systems-Source-Index.md
      - 科研工作流设计问题: agent-loop-systems/Scientific-Workflow-Agent-Design-Questions.md
      - Claude Science:
          - 设计哲学: agent-loop-systems/Agent-Loop-Systems-Claude-Science-Design-Philosophy.md
          - 长文参考: agent-loop-systems/Claude-Science-Full-Reference-ZH.md
      - 核心主题:
          - 循环与执行框架（Loop / Harness）: agent-loop-systems/Agent-Loop-Systems-Loop-and-Harness-Architecture.md
          - 人工介入与护栏（HITL / Guardrails）: agent-loop-systems/Agent-Loop-Systems-Human-in-the-Loop-and-Guardrails.md
          - 验证、评估与可观测性（Verification / Evals）: agent-loop-systems/Agent-Loop-Systems-Verification-Evals-and-Observability.md
          - 记忆、学习与 Wiki: agent-loop-systems/Agent-Loop-Systems-Memory-Learning-and-Wiki.md
          - 风险与反方观点: agent-loop-systems/Agent-Loop-Systems-Community-Risks-and-Counterpoints.md
  - 站点维护:
      - 中文化维护模块: site-maintenance/translation-module.md
